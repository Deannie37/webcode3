<!DOCTYPE html>
<html>
<head>
<title>Employee Details</title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
}

table{
    border-collapse: collapse;
    margin:auto;
    background:white;
    padding:20px;
}

td{
    padding:8px;
}

.section{
    font-weight:bold;
    color:blue;
    border-bottom:2px solid blue;
}

input, select, textarea{
    width:100%;
    padding:5px;
}

button{
    padding:10px 20px;
    background:blue;
    color:white;
    border:none;
    border-radius:4px;
}
</style>
</head>

<body>

<h2 align="center">Employee Details</h2>

<form>

<table border="0">

<tr>
<td colspan="2" class="section">01. Personal Information</td>
</tr>

<tr>
<td>
<label>Employee Name *</label><br>
<input type="text" placeholder="First Name">
</td>

<td>
<label>Last Name</label><br>
<input type="text" placeholder="Last Name">
</td>
</tr>

<tr>
<td>
<label>Starting Date</label><br>
<input type="date">
</td>

<td>
<label>Birth Date</label><br>
<input type="date">
</td>
</tr>

<tr>
<td>
<label>Employee Type</label><br>
<select>
<option>Select</option>
<option>Full Time</option>
<option>Part Time</option>
<option>Intern</option>
</select>
</td>

<td>
<label>Gender</label><br>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
</td>
</tr>

<tr>
<td colspan="2">
<label>Position</label><br>
<input type="text" placeholder="Position">
</td>
</tr>


<tr>
<td colspan="2" class="section">02. Location</td>
</tr>

<tr>
<td>
<label>City</label><br>
<input type="text" placeholder="City">
</td>

<td>
<label>State</label><br>
<input type="text" placeholder="State">
</td>
</tr>

<tr>
<td>
<label>ZIP</label><br>
<input type="text" placeholder="ZIP">
</td>

<td>
<label>Address</label><br>
<textarea rows="3"></textarea>
</td>
</tr>


<tr>
<td colspan="2" class="section">03. Contact Information</td>
</tr>

<tr>
<td>
<label>Phone</label><br>
<input type="text" placeholder="Phone">
</td>

<td>
<label>Email</label><br>
<input type="email" placeholder="Email">
</td>
</tr>

<tr>
<td colspan="2" align="center">
<br>
<button type="submit">Register</button>
</td>
</tr>

</table>

</form>

</body>
</html>
